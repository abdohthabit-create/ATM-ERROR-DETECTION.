<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام صيانة ATM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>نظام تشخيص الأعطال</h3>
        <input type="text" id="code" placeholder="أدخل كود الخطأ (مثال: 5001)">
        <button onclick="search()">بحث</button>
        <div id="result" style="margin-top:20px;"></div>
    </div>
    <script>
        const db = [
            { "code": "5001", "title": "عطل موتور الموزع", "sol": "فحص التروس وإزالة العوائق" },
            { "code": "12007", "title": "انحشار مسار النقل", "sol": "تنظيف الحساسات وإزالة الأوراق" }
        ];
        function search() {
            const val = document.getElementById('code').value;
            const item = db.find(i => i.code === val);
            document.getElementById('result').innerHTML = item ? `<h4>${item.title}</h4><p>الحل: ${item.sol}</p>` : "الكود غير موجود";
        }
    </script>
</body>
</html>
